name: test-formula

on:
  push:
    branches: [main]
  pull_request:

env:
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tap this checkout
        run: brew tap ildarbinanas-design/tap "$GITHUB_WORKSPACE"

      - name: brew style
        run: brew style ildarbinanas-design/tap

      - name: brew install
        run: brew install ildarbinanas-design/tap/env-vault

      - name: brew test
        run: brew test ildarbinanas-design/tap/env-vault
